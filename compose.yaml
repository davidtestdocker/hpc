services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    environment:
      APP_NAME: HPC API Dev
    volumes:
      - ./api:/app/api
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hpc
      POSTGRES_PASSWORD: hpc_password
      POSTGRES_DB: hpc_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  redis_data:
  postgres_data:
