#此檔案室argocd 用來改變自己的行為，告訴 Repo Server 執行 Kustomize 時，要加哪些參數
apiVersion: v1
kind: ConfigMap

metadata:
  name: argocd-cm
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-cm
    app.kubernetes.io/part-of: argocd

data:
  kustomize.buildOptions: >-
    --enable-helm
    --load-restrictor LoadRestrictionsNone
