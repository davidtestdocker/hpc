apiVersion: apps/v1
kind: Deployment

metadata:
  name: api
  namespace: hpc-platform-stage
spec:

  template:
    spec:
      containers:
        - name: api

          env:
            - name: APP_ENV
              value: stage

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"

            limits:
              cpu: "300m"
              memory: "384Mi"
