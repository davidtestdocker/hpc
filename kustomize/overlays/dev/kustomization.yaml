apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: hpc-platform-dev


helmGlobals:
  chartHome: ../../../helm

helmCharts:
  - name: api
    releaseName: api
    namespace: hpc-platform-dev
    valuesFile: ../../../helm/api/values-dev.yaml
    includeCRDs: false

  - name: redis
    releaseName: redis
    namespace: hpc-platform-dev
    includeCRDs: false

  - name: postgres
    releaseName: postgres
    namespace: hpc-platform-dev
    includeCRDs: false

patches:
  - path: deployment-patch.yaml
  - path: ingress-patch.yaml

