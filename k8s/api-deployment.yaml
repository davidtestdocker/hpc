apiVersion: apps/v1
kind: Deployment

metadata:
  name: api
  namespace: hpc-platform

spec:
  replicas: 1

  selector:
    matchLabels:
      app: api

  template:

    metadata:
      labels:
        app: api

    spec:

      containers:

      - name: api

        image: hpc-ai-benchmark-platform-api

        imagePullPolicy: Never

        ports:

        - containerPort: 8000

        env:
          - name: REDIS_HOST
            value: redis-service
          - name: REDIS_PORT
            value: "6379"
