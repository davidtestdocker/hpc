apiVersion: apps/v1
kind: Deployment

metadata:
  name: api
  namespace: hpc-platform

spec:
  replicas: 1

  selector:
    matchLabels:
      app: api

  template:

    metadata:
      labels:
        app: api

    spec:

      containers:
      - name: api
        image: hpc-ai-benchmark-platform-api
        imagePullPolicy: Never

        ports:
        - containerPort: 8000

        envFrom:
          - configMapRef:
              name: api-config
          - secretRef:
              name: postgres-secret

        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"

        readinessProbe:
          httpGet:
            path: /health/redis
            port: 8000

          initialDelaySeconds: 5
          periodSeconds: 10

        livenessProbe:
          httpGet:
            path: /health
            port: 8000

          initialDelaySeconds: 10
          periodSeconds: 10
