apiVersion: apps/v1
kind: StatefulSet

metadata:
  name: postgres
  namespace: hpc-platform

spec:
  serviceName: postgres-service

  replicas: 1

  selector:
    matchLabels:
      app: postgres

  template:

    metadata:
      labels:
        app: postgres

    spec:

      containers:

        - name: postgres

          image: postgres:16-alpine

          ports:

            - containerPort: 5432

          env:

            - name: POSTGRES_DB
              value: hpc_platform

            - name: POSTGRES_USER
              value: hpc

            - name: POSTGRES_PASSWORD
              value: hpc_password

          volumeMounts:

            - name: postgres-storage
              mountPath: /var/lib/postgresql/data

      volumes:

        - name: postgres-storage

          persistentVolumeClaim:

            claimName: postgres-pvc
