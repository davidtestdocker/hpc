apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: api-ingress
  namespace: hpc-platform

spec:
  rules:
    - host: api.hpc.local

      http:

        paths:

          - path: /

            pathType: Prefix

            backend:

              service:

                name: api-service

                port:

                  number: 8000
